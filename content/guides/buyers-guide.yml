title: "Buyer's Guide — Gen 3 & Gen 4 (NM–NX)"
description: >
  What to check before buying a used Mitsubishi Pajero (Montero / Shogun) Gen 3 (2000–2006) or
  Gen 4 (2007–2021). Covers engine-specific issues, corrosion hotspots, 4WD system checks,
  recalls, and what to prioritise when inspecting any example.
