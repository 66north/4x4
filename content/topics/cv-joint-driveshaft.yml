slug: cv-joint-driveshaft
title: "CV Joint & Driveshaft Inspection"
category: maintenance
difficulty: 2
time_minutes: 30
applies_to:
  engines: [4M41, 6G75]
  years: [2008, 2009, 2010, 2011, 2012, 2013]
description: >
  The Pajero IV has front CV (constant velocity) joints and rear propshaft universal joints.
  The front CV joints allow the wheels to steer while transmitting drive. They are packed with
  grease inside rubber boots — when a boot tears, grease escapes, grit enters, and the joint
  destroys itself within weeks. Inspect boots at every 20,000 km service. Clicking or clunking
  when turning sharply at low speed is a classic sign of a worn outer CV joint.

symptoms:
  - "Clicking or clunking sound when turning sharply at low speed (outer CV joint)"
  - "Vibration through steering wheel or floor at highway speed (front driveshaft balance)"
  - "Grease flung onto wheel or inner guard (torn CV boot)"
  - "Vibration through floor increasing with speed (rear propshaft U-joint)"
  - "Knocking from underneath during acceleration from rest (worn inner CV or U-joint)"
  - "Torn rubber boot visible on front driveshaft"

parts:
  - name: "Outer CV joint boot kit — front (left)"
    oem: "MR418082"
    spec: "Rubber boot with clamps and grease"
    notes: "Replace immediately when torn — grease loss destroys the joint within weeks. $20–40."
    verify: true
  - name: "Outer CV joint boot kit — front (right)"
    oem: "MR418083"
    spec: "Rubber boot with clamps and grease"
    notes: "$20–40. Always replace in pairs if both are the same age."
    verify: true
  - name: "Outer CV joint assembly — front"
    oem: "MR418090"
    spec: "Complete outer CV joint (replace if clicking persists after boot replacement)"
    notes: "Replace if clicking despite new boot and grease. $80–200 per side."
    verify: true
  - name: "Inner CV boot kit — front"
    oem: "MR418085"
    spec: "Inner tripod-type CV boot"
    notes: "Inner boot is larger and uses a different clamp type. $20–45."
    verify: true
  - name: "Propshaft centre bearing"
    oem: "MB527569"
    spec: "Rubber-mounted centre support bearing"
    notes: "Replace if vibration appears at specific highway speeds. $40–100."
    verify: true

tools:
  - "17mm socket (wheel bolts)"
  - "30mm socket or equivalent (hub nut — if removing driveshaft)"
  - "CV boot clamp pliers"
  - "CV joint grease (molybdenum disulphide type)"
  - "Torque wrench"

torque:
  - component: "Front hub nut (driveshaft retaining)"
    value_nm: 200
    note: "196–216 Nm. Always use a new hub nut — the old one is staked and cannot be reused safely."
  - component: "Wheel nuts"
    value_nm: 108
    note: "108–118 Nm."

tips:
  - "Inspect CV boots at every oil change — crouch beside the front wheel and look at the driveshaft for grease spray or visible boot damage."
  - "A torn boot with no clicking yet means the joint is still good — replace the boot and regrease before the joint wears. This is a $30 fix vs $150+ for a new joint."
  - "Clicking on full lock in one direction only indicates the outer CV joint on that side. Clicking in both directions usually means an inner joint."
  - "Do not confuse CV joint clicking with brake pad wear indicator squeal — brake squeal is continuous at low speed, CV click is only when turning."
  - "Off-road driving over rocks and obstacles tears CV boots rapidly. Check them after every off-road trip."

procedure_refs:
  - label: "Factory procedure — Front Axle (Section 26)"
    section: "26"
    manual: "M1"

related:
  - 4wd-not-engaging
  - wheel-alignment
  - suspension-squeaks-and-clunks
