slug: fault-code-p0440
title: "P0440 — Evaporative Emission Control System Malfunction"
category: codes
difficulty: 2
time_minutes: 45
applies_to:
  engines: [6G75]
  years: [2008, 2009, 2010, 2011, 2012, 2013]
description: >
  P0440 indicates a large leak or malfunction in the EVAP (evaporative emission control) system.
  This system captures fuel vapour from the fuel tank and routes it into the intake manifold to be
  burned rather than venting to atmosphere. The most common cause is a loose or damaged fuel filler
  cap — always start there. This is a petrol-only code; the 4M41 diesel does not have an EVAP system.

symptoms:
  - "Check Engine light illuminated"
  - "Smell of fuel from outside the vehicle (fuel vapour escaping)"
  - "No drivability symptoms in most cases"
  - "Failed emissions test"

likely_causes:
  - "Loose, cracked, or damaged fuel filler cap (most common — 40% of cases)"
  - "EVAP purge valve stuck open or closed"
  - "Cracked or disconnected EVAP charcoal canister hose"
  - "Failed EVAP pressure sensor"
  - "Large leak in fuel tank EVAP plumbing"

diagnosis:
  step_1: "Remove and inspect the fuel filler cap. If cap does not click or has a damaged seal, replace it and clear the code."
  step_2: "If code returns after cap replacement, perform a smoke test on the EVAP system (workshop tool required — pressurises the system with smoke to reveal leaks)."
  step_3: "Inspect the charcoal canister and connected hoses in the engine bay and under the vehicle near the fuel tank."
  step_4: "Test the EVAP purge solenoid valve — apply 12V to the solenoid and listen for a click (should open). Solenoid should be closed at rest."
  step_5: "If smoke test reveals a large leak at the tank or canister, investigate further with lifted vehicle."

common_fixes:
  filler_cap: "Replace fuel filler cap — $15–40"
  purge_valve: "Replace EVAP purge solenoid — $40–100 part, $80–150 labor"
  canister: "Replace charcoal canister — $100–250 part, $80–150 labor"
  hose_repair: "Repair or replace cracked hose — $20–80"

estimated_repair_cost: "$15–40 (filler cap most common); $200–400 if purge valve or canister needed"

tips:
  - "Always start with the fuel filler cap — it is free to inspect and $15–40 to replace. It fixes P0440 in 40% of cases."
  - "Tighten the cap until it clicks. Many drivers tighten it too loosely, causing intermittent P0440."
  - "If the fuel smell is strong and persistent, suspect a cracked canister or disconnected hose — this is also a fire hazard and should be fixed promptly."
  - "P0440 does not affect engine performance. The vehicle is safe to drive while diagnosing, but should not be ignored due to emissions and fire risk."

parts:
  - name: "Fuel filler cap (first thing to check)"
    oem: "MN154888"
    spec: "Locking filler cap with pressure relief"
    notes: "Check this first. $15–40. Non-locking version also available."
    verify: false
  - name: "EVAP purge solenoid valve"
    oem: "MR507604"
    spec: "12V normally-closed solenoid"
    notes: "$40–100. Located in engine bay on the intake side."
    verify: true

procedure_refs:
  - label: "Factory procedure — Emission Control (Section 14)"
    section: "14"
    manual: "M1"

related:
