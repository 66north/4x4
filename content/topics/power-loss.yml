slug: power-loss
title: Loss of Power or Sluggish Acceleration
category: troubleshoot
difficulty: 2
time_minutes: 30
applies_to:
  engines: [4M41, 6G75]
  years: [2008, 2009, 2010, 2011, 2012, 2013]
description: >
  If your Pajero hesitates, feels sluggish, or won't accelerate above 3000 RPM, the engine is likely
  in limp-mode or suffering from fuel/air restriction. Power loss can be caused by fuel starvation,
  air intake blockage, clogged catalytic converter, transmission slipping, or engine timing retard.
  Diagnosis requires checking fuel pressure, airflow, and scanning for fault codes.

symptoms:
  - Engine feels weak or underpowered, especially under load
  - Slow acceleration or inability to reach normal RPM
  - Engine cuts power at a specific RPM (often 3000-4000 RPM, limp-mode threshold)
  - Check Engine light illuminated
  - Black smoke from exhaust (overfueling), white smoke (lean or coolant), or blue smoke (oil burn)
  - Transmission seems to slip or not hold gears (but may be normal if engine is weak)
  - Hesitation when merging on highway or climbing hills

common_causes_diesel_4m41:
  fuel_filter_clogged: "Restricted fuel flow reduces power. Symptoms: worse under load. Fix: replace fuel filter (see fuel-filter-diesel.yml)"
  turbocharger_boost_leak: "Boost hose cracked or disconnected; intercooler hose leaking. Engine cannot build pressure. Fix: inspect and seal hoses (20-100 dollars)"
  egr_valve_stuck: "EGR diverts exhaust to intake; if stuck, reduces power. Fix: clean or replace EGR valve (150-300 dollars labor)"
  dpf_clogged: "Severe DPF blockage restricts exhaust flow. Engine cuts power in limp-mode. Fix: force DPF regeneration or professional cleaning (see dpf-warning-light.yml)"
  fuel_injector_timing: "Injector timing retarded by ECU due to fault code. Fix: diagnose and repair fault (varies)"

common_causes_petrol_6g75:
  air_filter_clogged: "Dirty air filter starves engine of oxygen. Easily diagnosed: remove filter and retest. Fix: replace air filter (see air-filter.yml)"
  catalytic_converter_clogged: "Converter becomes plugged with carbon. Backpressure rises. Engine enters limp-mode. Fix: replace converter (400-800 dollars) or remove carbon (risky)"
  mass_air_flow_sensor: "MAF sensor reads incorrect airflow; ECU runs wrong fuel trim. Engine is either too lean or too rich. Fix: clean or replace MAF sensor (50-200 dollars)"
  ignition_timing_retard: "Knock sensor detects pre-ignition; ECU retards timing for safety. Reduces power. Fix: use premium fuel or diagnose knock source"
  transmission_slipping: "Fluid degradation or worn converter reduces power transfer. Feels like loss of engine power, but is transmission. Fix: transmission fluid change or repair"

diagnosis_procedure:
  step_1: "Scan for codes. P0100 series = air/fuel problem. P0128 = thermostat. P0400 = EGR system. P0420 = catalytic converter. These narrow the scope"
  step_2: "Check air filter. Remove and visually inspect — if clogged (dusty, black), replace it and retest. Most common fix for petrol"
  step_3: "Measure fuel pressure at idle and under load. Diesel: 270-310 kPa idle. Petrol: 280-320 kPa. If pressure drops under load, fuel pump is failing"
  step_4: "Check exhaust backpressure using a vacuum gauge at the intake manifold. If vacuum drops when accelerating (instead of rising), suspect blockage in exhaust"
  step_5: "On diesel, listen for turbo boost sound. When accelerating, you should hear a whistle from the turbo. If absent, boost may be leaking"
  step_6: "Check transmission fluid condition and level. Dark or burnt-smelling fluid indicates transmission wear. Slipping transmission can mimic engine power loss"

tools:
  - OBD2 scan tool to read fault codes
  - Fuel pressure gauge (to check fuel system)
  - Vacuum gauge (to check exhaust backpressure)
  - Air filter (for inspection/replacement)
  - Flashlight and mirror (to inspect filter and hoses)

tips:
  - Fuel octane rating matters on the 6G75 petrol. Using 87-octane fuel in a vehicle tuned for 91-octane causes knock and power loss. Switch to premium fuel and retest
  - Turbo lag is normal on the 4M41 diesel; low-RPM power is weak until boost builds. If this feels unusually sluggish, suspect boost leak
  - Transmission fluid condition directly affects feel of acceleration. Even if engine is strong, a worn transmission feels powerless
  - If power loss appears suddenly after a gas station fill-up, suspect bad fuel or water in tank. Drain tank and refill with fuel from a different station
  - Limp-mode is a safety feature: engine deliberately limits power to prevent damage. Address the underlying fault code; power returns when code is cleared

