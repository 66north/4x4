slug: coolant-specifications
title: Coolant — Specifications & Capacity
category: specs
difficulty: 1
time_minutes: 15
applies_to:
  engines: [4M41, 6G75]
  years: [2008, 2009, 2010, 2011, 2012, 2013]
description: >
  Coolant prevents your engine from overheating and protects against corrosion and freezing. The Pajero IV cooling
  system holds approximately 9.5 liters and requires a specific type of coolant compatible with Mitsubishi's aluminum
  engine blocks and radiators. Using the wrong coolant can cause corrosion, leaks, and engine damage. This guide covers
  coolant selection, capacity, and flush intervals for both the 4M41 diesel and 6G75 petrol engines.

specifications:
  capacity:
    total_liters: 9.5
    includes: "Radiator, engine block, heater circuit, and expansion tank reserve"
    notes: "Capacity is the same for both 4M41 diesel and 6G75 petrol engines."

  coolant_type:
    recommended_types:
      - "Mitsubishi Genuine Coolant (DPS, ACD-100X, or equivalent)"
      - "Any ASTM D3306, ASTM D1384 compliant ethylene glycol-based coolant"
    avoid:
      - "Silicate-based coolants (older green types) — not compatible with modern engines"
      - "Mixing different coolant colors or brands — can form sediment and clog passages"
    color_note: "Mitsubishi may supply various colors (green, pink, orange) but they are all the same chemistry. Color is for identification only."

  standards:
    - ASTM D3306 (automotive antifreeze/coolant)
    - ASTM D1384 (coolant boiling point and corrosion)
    - CUNA NC 956-16 (European standard)
    - SAE J1034 (performance standards)

  pressure_rating:
    system_pressure_bar: 1.3
    notes: "The cooling system is pressurized to raise the boiling point and improve heat transfer. A weak pressure cap can cause overheating."

flush_intervals:
  interval_km: 40000
  interval_months: 24
  severe_driving: "Every 20,000 km or 12 months if operating in hot climates or towing frequently"
  notes: "Coolant degrades over time, losing its corrosion inhibitors. Old coolant turns brown/black and becomes acidic."

tips:
  - "Always let the engine cool before opening the radiator cap — pressurized coolant can cause severe burns."
  - "Check coolant level in the expansion tank (not the radiator directly). Top up with the same type if low."
  - "Never use water alone as coolant — it freezes in winter and lacks corrosion inhibitors."
  - "A 50/50 mix of coolant and distilled water is standard for most climates. In very cold regions (-30°C or below), use 60% coolant / 40% water."
  - "If your coolant level drops frequently, you have a leak. Do not ignore this — a running engine without coolant overheats in seconds."
  - "White crusty deposits on the engine or radiator indicate coolant leaks or a failed gasket. Have the system inspected."
  - "When flushing, use distilled water to rinse the system, not tap water. Tap water contains minerals that corrode."

procedure_refs:
