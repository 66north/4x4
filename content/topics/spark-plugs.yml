slug: spark-plugs
title: Spark Plug Replacement
category: maintenance
difficulty: 1
time_minutes: 30
applies_to:
  engines: [6G75]
  years: [2008, 2009, 2010, 2011, 2012, 2013]
description: >
  The 6G75 petrol engine has six spark plugs, one per cylinder. Factory service intervals recommend
  replacement every 40,000 km for standard copper plugs, or every 100,000 km for premium platinum/iridium
  plugs (which cost more upfront but last longer). Worn plugs increase fuel consumption, reduce starting
  reliability, and cause hesitation under acceleration. The job is straightforward — no special tools required
  beyond a spark plug socket.

symptoms:
  - Scheduled maintenance interval (40,000 km for copper, 100,000 km for premium)
  - Difficulty starting, especially in cold weather
  - Rough idle or stumbling during acceleration
  - Visible spark plug fouling (black soot, oil residue, or gap erosion when inspected)
  - Reduced fuel economy or loss of performance
  - Slight hesitation when upshifting under light load

