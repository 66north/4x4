slug: brake-hose-replacement
title: "Brake Hose Inspection & Replacement"
category: maintenance
difficulty: 2
time_minutes: 30
applies_to:
  engines: [4M41, 6G75]
  years: [2008, 2009, 2010, 2011, 2012, 2013]
description: >
  The Pajero IV has four flexible rubber brake hoses — one per corner — connecting the rigid brake
  lines to the brake callipers and rear axle. Rubber hoses degrade internally over time, bulging
  or collapsing under pressure. A collapsed hose can cause brake drag on one wheel (vehicle pulls
  to one side) or slow brake release. Inspect all four hoses at major services. Replace in axle
  pairs when any sign of deterioration is found.

symptoms:
  - "Vehicle pulls to one side during braking (restricted hose on that side)"
  - "Brake drag on one wheel — wheel hot after driving, brakes not fully releasing"
  - "Visible cracking, bubbling, or swelling of the rubber hose body"
  - "Soft or spongy brake pedal (internal hose collapse restricting fluid return)"
  - "Brake fluid leak at hose-to-line or hose-to-calliper connection"

parts:
  - name: "Front brake hose (left)"
    oem: "MR129742"
    spec: "Rubber flexible hose, female-female ends"
    notes: "Inspect for swelling or cracks. Replace in pairs. $20–40."
    verify: true
  - name: "Front brake hose (right)"
    oem: "MR129743"
    spec: "Rubber flexible hose"
    notes: "$20–40."
    verify: true
  - name: "Rear brake hose (axle)"
    oem: "MR584085"
    spec: "Rubber flexible hose to rear axle T-piece"
    notes: "One hose feeds both rear callipers via the axle junction block. $25–50."
    verify: true
  - name: "Brake fluid — DOT 3/4"
    oem: null
    spec: "DOT 3 or DOT 4 brake fluid"
    quantity: "Approx 100 mL per hose replacement"
    notes: "Top up and bleed after any hose replacement. $10–15 per bottle."
    verify: false

tools:
  - "10mm and 11mm flare-nut spanner (brake line fittings)"
  - "14mm open spanner (hose-to-calliper banjo bolt)"
  - "Brake hose holding tool or locking pliers"
  - "Brake bleeder kit"
  - "Torque wrench"

torque:
  - component: "Brake hose banjo bolt (to calliper)"
    value_nm: 30
    note: "25–35 Nm. Use new copper sealing washers."
  - component: "Brake line flare nut (to hose)"
    value_nm: 16
    note: "14–18 Nm. Use flare-nut spanner to avoid rounding."

tips:
  - "Always use a flare-nut spanner on brake line fittings — an open-ended spanner rounds the soft brass nut immediately."
  - "Hold the hose body with a second spanner when tightening the line nut — do not allow the hose to twist."
  - "Inspect hoses with the suspension at full droop and full compression — a hose that is tight at full droop may be cracking at the bend."
  - "Replace copper banjo bolt sealing washers on both sides every time the banjo is disturbed — they are one-use crush washers."
  - "Bleed the affected calliper after any hose replacement. If you replaced a front hose, bleed that corner. Rear hose replacement requires bleeding both rear callipers."
  - "Never re-use brake fluid drained from the system — brake fluid absorbs moisture and should be discarded."

procedure_refs:
  - label: "Factory procedure — Brakes (Section 35)"
    section: "35"
    manual: "M1"

related:
  - brake-pads-front
  - brake-pads-rear
  - brake-fluid-flush
