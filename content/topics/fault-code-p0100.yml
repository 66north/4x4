slug: fault-code-p0100
title: "P0100 — Mass Air Flow (MAF) Circuit Malfunction"
category: codes
difficulty: 2
time_minutes: 30
applies_to:
  engines: [6G75]
  years: [2008, 2009, 2010, 2011, 2012, 2013]
description: >
  Code P0100 indicates the engine control unit (ECU) has detected a problem with the Mass Air Flow (MAF) sensor circuit.
  The MAF sensor measures incoming air volume and helps the ECU calculate the correct fuel mixture. A faulty MAF sensor
  causes poor fuel economy, hesitation, and rough idle. This code is specific to petrol engines (6G75); diesel engines
  (4M41) do not have MAF sensors.

symptoms:
  - "Check Engine light illuminated"
  - "Rough idle (engine shakes at stoplight)"
  - "Hesitation when accelerating"
  - "Reduced fuel economy (10-20% worse)"
  - "Engine stumbles or stalls at low RPM"
  - "Black smoke from exhaust (overfueling)"
  - "Loss of power under load"

likely_causes:
  - "Dirty or contaminated MAF sensor (most common — 60% of cases)"
  - "MAF sensor wiring harness loose or corroded"
  - "Air leak between MAF sensor and engine (unmeasured air bypasses sensor)"
  - "Failing MAF sensor (needs replacement)"
  - "Engine air filter clogged (restricts airflow, confuses MAF)"
  - "ECU sensor reading out of range (rare)"

diagnosis:
  step_1: "Connect OBD-II scanner and retrieve code P0100. Check for pending codes or additional codes."
  step_2: "Visually inspect MAF sensor wiring harness for damage, corrosion, or loose connectors. Inspect air intake for cracks or leaks."
  step_3: "Check air filter. If very dirty (black, clogged), replace it and clear the code. Code may not return."
  step_4: "Inspect air intake hoses between air filter and throttle body for cracks or disconnects. A vacuum leak causes unmeasured air."
  step_5: "If air filter and hoses are clean, remove the MAF sensor (located in air intake) and inspect for contamination or damage."
  step_6: "If sensor appears dirty, attempt cleaning with MAF sensor cleaner (specialized product, not carb cleaner). Allow to air dry completely."
  step_7: "If cleaning does not resolve the code, replace the MAF sensor."

common_fixes:
  dirty_sensor: "Clean with MAF sensor cleaner; cost $0-50 if DIY, $150-300 if professional"
  air_leak: "Inspect and reseal air intake hoses; cost $50-200"
  air_filter: "Replace; cost $30-80"
  maf_sensor_replacement: "Replace sensor; OEM part ~$200-400, labor ~$100-150, total $300-550"
  wiring_issue: "Repair corroded connector or loose wire; cost $50-150"

estimated_repair_cost: "$150-400 (most cases resolved by cleaning or air filter change; full sensor replacement is higher end)"

tips:
  - "Always replace the engine air filter when diagnosed with P0100. A clogged filter commonly triggers this code."
  - "Do NOT use carburator cleaner or compressed air on the MAF sensor — this damages the sensitive heating element. Use only MAF-specific cleaner."
  - "MAF sensor contamination is often caused by a failing or clogged air filter. After cleaning the MAF sensor, replace the air filter to prevent recurrence."
  - "If the code returns after cleaning, the sensor is likely failing and needs replacement."
  - "A vacuum leak (cracked hose or loose connector) can also trigger this code by allowing unmeasured air into the engine. Inspect all air intake hoses."

